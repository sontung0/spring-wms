spring.application.name=wms

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/spring
spring.datasource.username=admin
spring.datasource.password=123123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Auth - OAuth
auth.oauth.redirectUri=http://localhost:3000/auth/callback
auth.oauth.providers.google.client-id=${GOOGLE_CLIENT_ID}
auth.oauth.providers.google.client-secret=${GOOGLE_CLIENT_SECRET}
auth.oauth.providers.github.client-id=YOUR_GITHUB_CLIENT_ID
auth.oauth.providers.github.client-secret=YOUR_GITHUB_CLIENT_SECRET

# Auth - JWT (generate real RSA keys for production)
auth.jwt.issuer=wms
auth.jwt.ttl=PT24H
auth.jwt.private-
auth.jwt.public-
